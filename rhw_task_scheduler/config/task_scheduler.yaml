# ============================================================
# rhw_task_scheduler 配置文件
# ============================================================

waypoint_manager:
  ros__parameters:
    # 航点持久化目录
    storage_dir: "~/.rhw/waypoints"

    # 点位变更事件（由 MQTT 网关统一转发）
    waypoint_event_topic: "/waypoint_manager/events"

    # 服务名
    add_waypoint_service: "/waypoint_manager/add_waypoint"
    delete_waypoint_service: "/waypoint_manager/delete_waypoint"
    get_waypoints_service: "/waypoint_manager/get_waypoints"

mission_bt_node:
  ros__parameters:
    # ---------- 行为树 ----------
    bt_tick_rate_hz: 10.0
    debug_print_tree_on_build: true
    debug_print_tree_on_tick: false
    debug_tree_show_status: true
    debug_tree_log_every_n_ticks: 1
    debug_export_tree_dot: false
    debug_tree_output_dir: "/tmp/rhw_task_scheduler_bt"

    # ---------- 导航 ----------
    nav_retry_max: 3
    navigation_frame_id: "map"
    navigate_to_pose_action: "/navigate_to_pose"
    nav2_behavior_tree: ""
    follow_path_action: "/follow_path"
    follow_path_controller_id: ""
    follow_path_goal_checker_id: ""
    follow_path_progress_checker_id: ""

    # ---------- PTZ ----------
    ptz_absolute_move_service: "/ptz/absolute_move"
    ptz_capture_service: "/ptz/capture_image"
    ptz_status_topic: "/ptz/status"
    nav_arrived_to_ptz_delay_sec: 0.0      # 导航到位后，开始移动云台前的固定停顿
    ptz_arrived_to_capture_delay_sec: 5.0  # 云台到位/稳定后，拍照前的固定停顿
    ptz_stable_timeout_sec: 5.0
    default_ptz_channel: 1

    # ---------- 充电 ----------
    recharge_service: "/recharge"

    # ---------- 电池监控 ----------
    battery_topic: "/robot/battery_status"
    low_battery_threshold: 20.0

    # ---------- 任务超时 ----------
    waypoint_task_timeout_sec: 120.0

    # ---------- 话题 ----------
    mission_status_topic: "/mission/status"
    inspection_album_report_topic: "/inspection/album_reports"
    inspection_album_upload_service: "/inspection/album_report/upload"
    album_upload_timeout_sec: 30.0
    model_task_run_service: "/rhw/model/task/run"
    model_task_timeout_sec: 60.0
